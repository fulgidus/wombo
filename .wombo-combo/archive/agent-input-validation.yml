id: agent-input-validation
title: Input hardening against hallucinations
description: >
  Add validation to all user/agent-supplied inputs: feature IDs, file paths, branch names, config values. Reject control
  characters (below ASCII 0x20), path traversals (../), embedded query params (?/#) in IDs, and percent-encoded strings
  that would be double-encoded.
