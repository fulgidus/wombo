id: self-upgrade
title: wombo upgrade command
description: >
  Add a `wombo upgrade` command that pulls the latest version of wombo-combo from GitHub and reinstalls it globally via
  bun. Should show the current version, check for a newer version, and prompt before upgrading. Must also support
  `--force` to skip the prompt and `--version vX.Y.Z` to pin to a specific release.
